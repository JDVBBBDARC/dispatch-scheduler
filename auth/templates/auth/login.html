<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — Dispatch Scheduler</title>
<link rel="manifest" href="/static/manifest.json"/>
<meta name="theme-color" content="#8B1A2B"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
<style>
  :root {
    --maroon: #8B1A2B;
    --maroon-dark: #6b1224;
    --surface: #ffffff;
    --bg: #f4f5f7;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, var(--maroon-dark) 0%, var(--maroon) 60%, #b5243a 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
    padding: 16px;
  }
  .login-card {
    background: var(--surface);
    border-radius: 18px;
    width: min(420px, 100%);
    box-shadow: 0 24px 64px rgba(0,0,0,.35);
    overflow: hidden;
  }
  .login-header {
    background: var(--maroon);
    padding: 32px 32px 28px;
    text-align: center;
  }
  .login-logo {
    height: 56px;
    width: auto;
    object-fit: contain;
    margin-bottom: 12px;
  }
  .login-header h1 {
    color: #fff;
    font-size: 1.15rem;
    font-weight: 800;
    letter-spacing: .06em;
    text-transform: uppercase;
    margin: 0;
  }
  .login-header p {
    color: rgba(255,255,255,.65);
    font-size: .78rem;
    margin-top: 4px;
  }
  .login-body {
    padding: 32px;
  }
  .login-label {
    font-size: .78rem;
    font-weight: 700;
    color: #555;
    text-transform: uppercase;
    letter-spacing: .04em;
    margin-bottom: 6px;
    display: block;
  }
  .login-input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: .95rem;
    background: #fafafa;
    transition: border-color .15s, box-shadow .15s;
    outline: none;
    color: #222;
  }
  .login-input:focus {
    border-color: var(--maroon);
    box-shadow: 0 0 0 3px rgba(139,26,43,.12);
    background: #fff;
  }
  .input-group-wrap {
    position: relative;
    margin-bottom: 20px;
  }
  .input-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: #aaa;
    font-size: 1rem;
    pointer-events: none;
  }
  .login-input.has-icon { padding-left: 36px; }
  .login-btn {
    width: 100%;
    padding: 13px;
    background: var(--maroon);
    color: #fff;
    border: none;
    border-radius: 9px;
    font-size: .95rem;
    font-weight: 700;
    letter-spacing: .04em;
    cursor: pointer;
    transition: background .15s, transform .1s;
    margin-top: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .login-btn:hover { background: var(--maroon-dark); transform: translateY(-1px); }
  .login-btn:active { transform: translateY(0); }
  .error-box {
    background: #fff0f1;
    border: 1.5px solid #f5c2c7;
    border-radius: 8px;
    padding: 10px 14px;
    font-size: .83rem;
    color: #842029;
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .login-footer {
    text-align: center;
    padding: 16px 32px 24px;
    font-size: .73rem;
    color: #aaa;
  }
  .toggle-pw {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #aaa;
    cursor: pointer;
    font-size: .95rem;
    padding: 0;
  }
  .toggle-pw:hover { color: var(--maroon); }
</style>
</head>
<body>

<div class="login-card">
  <!-- Header -->
  <div class="login-header">
    <img src="/static/images/logo.png" alt="Big Ben" class="login-logo"
         onerror="this.style.display='none'">
    <h1>Dispatch Scheduler</h1>
    <p>Sign in to your account</p>
  </div>

  <!-- Body -->
  <div class="login-body">
    {% if error %}
    <div class="error-box">
      <i class="bi bi-exclamation-circle-fill"></i>
      {{ error }}
    </div>
    {% endif %}

    <form method="POST" action="{{ url_for('auth.login') }}">
      <input type="hidden" name="next" value="{{ next }}"/>

      <!-- Username -->
      <label class="login-label">Username</label>
      <div class="input-group-wrap">
        <i class="bi bi-person input-icon"></i>
        <input type="text" name="username" class="login-input has-icon"
               placeholder="Enter username" autocomplete="username"
               autofocus required/>
      </div>

      <!-- Password -->
      <label class="login-label">Password</label>
      <div class="input-group-wrap" style="margin-bottom:24px;">
        <i class="bi bi-lock input-icon"></i>
        <input type="password" name="password" id="pwInput"
               class="login-input has-icon"
               placeholder="Enter password" autocomplete="current-password" required/>
        <button type="button" class="toggle-pw" onclick="togglePw()" id="togglePwBtn">
          <i class="bi bi-eye" id="pwEyeIcon"></i>
        </button>
      </div>

      <button type="submit" class="login-btn">
        <i class="bi bi-box-arrow-in-right"></i> Sign In
      </button>
    </form>
  </div>

  <div class="login-footer">
    BigBen Dispatch &nbsp;·&nbsp; Logistics Scheduling System
  </div>
</div>

<script>
function togglePw() {
  const inp  = document.getElementById('pwInput');
  const icon = document.getElementById('pwEyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    icon.className = 'bi bi-eye-slash';
  } else {
    inp.type = 'password';
    icon.className = 'bi bi-eye';
  }
}
</script>
</body>
</html>
