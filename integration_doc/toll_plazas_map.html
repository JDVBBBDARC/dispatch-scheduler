// Initialize map centered roughly on the geographic centroid of the
// dataset (Metro Manila / southern Luzon midpoint). Zoom level 9 shows
// most of the network at once.
const map = L.map('map').setView([14.85, 120.95], 9);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; OpenStreetMap contributors',
}).addTo(map);

// Plot each plaza. Use a small filled circle so 100+ markers don't
// crowd the map. Click reveals plaza details + Google Maps link.
PLAZAS.forEach(([name, expressway, lat, lng, radius]) => {
  const color = EXPRESSWAY_COLORS[expressway] || '#666';
  const marker = L.circleMarker([lat, lng], {
    radius: 6,
    fillColor: color,
    color: '#fff',
    weight: 2,
    opacity: 1,
    fillOpacity: .9,
  }).addTo(map);

  // Also draw the actual geofence radius as a translucent disc so
  // it's visually obvious how big each detection zone is.
  L.circle([lat, lng], {
    radius: radius,
    color: color,
    weight: 1,
    fillColor: color,
    fillOpacity: .12,
  }).addTo(map);

  const popup = `
    <b>${name}</b><br>
    <i>${expressway}</i><br>
    Coords: ${lat.toFixed(6)}, ${lng.toFixed(6)}<br>
    Radius: ${radius}m<br>
    <a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank">
      Open in Google Maps →
    </a><br>
    <a href="https://www.google.com/maps/@${lat},${lng},19z/data=!3m1!1e3" target="_blank">
      Satellite view (for coord verification) →
    </a>
  `;
  marker.bindPopup(popup);
});

// Legend showing the colour scheme + count per expressway.
const counts = {};
PLAZAS.forEach(p => { counts[p[1]] = (counts[p[1]] || 0) + 1; });
const legend = L.control({position: 'bottomright'});
legend.onAdd = () => {
  const div = L.DomUtil.create('div', '');
  div.id = 'legend';
  div.innerHTML = '<b style="color:#8B1A2B;">9 Expressways</b>';
  Object.entries(EXPRESSWAY_COLORS).forEach(([exp, color]) => {
    const n = counts[exp] || 0;
    div.innerHTML += `
      <div class="legend-item">
        <span class="legend-dot" style="background:${color};"></span>
        ${exp} <span style="color:#888;">(${n})</span>
      </div>`;
  });
  return div;
};
legend.addTo(map);
