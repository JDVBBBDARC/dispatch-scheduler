// Helper to render a plaza marker. Accurate ones get filled, bright
// markers + solid radius circle. Approximate ones get hollow markers
// with dashed radius — visually obvious they're approximate.
function renderMarker(name, expressway, lat, lng, radius, source) {
  const color = EXPRESSWAY_COLORS[expressway] || '#666';
  const accurate = source === 'cartrack';   // active in Cartrack — detecting
  const osm      = source === 'osm';        // booth-accurate via OSM — ready to activate

  // The marker dot. Three tiers:
  //   cartrack — solid fill (live detection running)
  //   osm      — half fill, solid border (coords booth-accurate, just
  //              needs the Cartrack geofence created to go live)
  //   csv      — hollow + dashed (position still unverified)
  const marker = L.circleMarker([lat, lng], {
    radius: accurate ? 7 : (osm ? 6 : 5),
    fillColor: (accurate || osm) ? color : '#fff',
    color: color,
    weight: 2,
    opacity: 1,
    fillOpacity: accurate ? 0.95 : (osm ? 0.45 : 0.3),
    dashArray: (accurate || osm) ? null : '4 3',
  }).addTo(map);

  // The detection radius disc.
  L.circle([lat, lng], {
    radius: radius,
    color: color,
    weight: accurate ? 1.5 : 1,
    fillColor: color,
    fillOpacity: accurate ? 0.18 : (osm ? 0.10 : 0.05),
    dashArray: accurate ? null : '4 3',
  }).addTo(map);

  const cleanName = name.replace(/^Toll\s*-\s*/i, '');
  const badge = accurate
    ? '<span class="accurate-badge">Cartrack — ACTIVE (detecting)</span>'
    : (osm
       ? '<span class="accurate-badge" style="background:#2980B9;">OSM booth-accurate — ready to activate</span>'
       : '<span class="approx-badge">Approximate — verify before activating</span>');
  const popup = `
    <b>${cleanName}</b><br>
    <i>${expressway}</i><br>
    ${badge}<br>
    Coords: ${lat.toFixed(6)}, ${lng.toFixed(6)}<br>
    Radius: ${radius}m<br>
    <a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank">
      Open in Google Maps →
    </a><br>
    <a href="https://www.google.com/maps/@${lat},${lng},19z/data=!3m1!1e3" target="_blank">
      Satellite view (for coord verification) →
    </a>
  `;
  marker.bindPopup(popup);

  // Permanent label ONLY on approximate (hollow) markers — surfaces
  // which plazas still need to be drawn in Cartrack so the admin can
  // tick them off the list at a glance. Skipping labels on the 59
  // accurate markers keeps the NLEX north corridor readable (where
  // 4 Pulilan booths, 3 San Fernando booths, etc. all cluster within
  // a few hundred metres).
  if (!accurate) {
    marker.bindTooltip(cleanName, {
      permanent:  true,
      direction:  'top',
      offset:     [0, -4],
      className:  'approx-label',
    });
  }
}

    const apx = apxCounts[exp] || 0;
    if (acc + apx === 0) return;
    div.innerHTML += `
      <div class="legend-item">
        <span class="legend-dot" style="background:${color};"></span>
        <span>${exp}
          <span style="color:#16A34A;font-weight:700;">${acc}✓</span>
          ${apx > 0 ? `<span style="color:#888;">+${apx}~</span>` : ''}
        </span>
      </div>`;
  });
  div.innerHTML += `
    </div>
    <div class="legend-section" style="font-size:.7rem;color:#666;">
      <b>${ACCURATE_PLAZAS.length}</b> booth-accurate +
      <b>${APPROXIMATE_PLAZAS.length}</b> approximate =
      <b>${ACCURATE_PLAZAS.length + APPROXIMATE_PLAZAS.length}</b> total
    </div>
  `;
  return div;
};
legend.addTo(map);
</script>
