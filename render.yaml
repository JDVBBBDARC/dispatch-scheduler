services:
  - type: web
    name: dispatch-scheduler
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app_v3:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /var/data/dispatch.db
    disk:
      name: dispatch-data
      mountPath: /var/data
      sizeGB: 1
